<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect: convert path to query parameter and redirect to index
      var segmentCount = 1; // adjust if deployed to subdirectory
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=' +
        encodeURIComponent(l.pathname.slice(1))
      );
    </script>
  </head>
  <body>Redirecting...</body>
</html>
